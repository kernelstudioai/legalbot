services:
  legalbot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-lc", "npm run db:migrate && npm run smoke:openwa"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.status === 200 ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 3
    env_file:
      - .env
    environment:
      OPENWA_BROWSER_EXECUTABLE_PATH: /usr/bin/chromium
      OPENWA_HEADLESS: "true"
      OPENWA_STATUS_SERVER_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/app/data
      - legalbot-openwa-session:/app/openwa-session

  legalbot-whatsapp-cloud:
    profiles:
      - cloud
    build:
      context: .
      dockerfile: Dockerfile
      target: cloud-runtime
    command: ["npm", "run", "start:whatsapp-cloud"]
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3002/health').then((res) => process.exit(res.status === 200 ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    env_file:
      - .env
    environment:
      WHATSAPP_TRANSPORT: cloud
      WHATSAPP_CLOUD_WEBHOOK_HOST: 0.0.0.0
      WHATSAPP_CLOUD_WEBHOOK_PORT: "3002"
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs

volumes:
  legalbot-openwa-session:
