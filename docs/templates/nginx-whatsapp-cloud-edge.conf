log_format legalbot_cloud_edge
  '$remote_addr - $remote_user [$time_local] '
  '"$request_method $uri $server_protocol" $status $body_bytes_sent '
  '"$http_referer" "$http_user_agent" '
  'host="$host" request_id="$request_id" '
  'upstream_status="$upstream_status" request_time="$request_time" '
  'upstream_response_time="$upstream_response_time"';

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    client_max_body_size 256k;

    access_log /var/log/nginx/legalbot-cloud-edge.access.log legalbot_cloud_edge;
    error_log /var/log/nginx/legalbot-cloud-edge.error.log warn;

    location = /_edge/healthz {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        access_log off;
        return 204;
    }

    location = /webhooks/whatsapp/cloud {
        limit_except GET POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:3002/webhooks/whatsapp/cloud;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Legalbot-Cloud-Replay "";
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;
        proxy_request_buffering on;
        proxy_buffering on;
    }

    location / {
        return 404;
    }
}
